<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmers Market Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background:#f5f7f0; color:#222; }

.header {
  background:#fff;
  padding:14px 20px 10px;
  border-bottom:1px solid #e0e8d8;
  position:sticky; top:0; z-index:1000;
}
.header h1 { font-size:22px; color:#2d6a2d; font-weight:800; letter-spacing:-0.5px; }
.header p  { font-size:13px; color:#666; margin-top:2px; }

.stats-bar {
  display:flex; gap:0;
  background:#fff;
  border-bottom:1px solid #e0e8d8;
  overflow-x:auto;
}
.stat {
  flex:1; min-width:90px;
  text-align:center;
  padding:10px 8px;
  border-right:1px solid #e0e8d8;
}
.stat:last-child { border-right:none; }
.stat .num { font-size:20px; font-weight:800; color:#2d6a2d; }
.stat .lbl { font-size:11px; color:#777; margin-top:1px; }

.emoji-strip {
  background:#fff;
  padding:10px 16px;
  border-bottom:1px solid #e0e8d8;
  display:flex; flex-wrap:wrap; gap:6px; align-items:center;
}
.emoji-filter {
  font-size:19px; cursor:pointer;
  padding:3px 7px; border-radius:8px;
  border:2px solid transparent;
  transition:.15s; line-height:1.2;
  user-select:none;
}
.emoji-filter:hover  { background:#f0f7e8; border-color:#aad08a; }
.emoji-filter.active { background:#e0f0cc; border-color:#2d6a2d; }
.filter-label { font-size:12px; color:#666; margin-right:2px; white-space:nowrap; }
.clear-filter {
  margin-left:auto; font-size:12px; color:#2d6a2d;
  cursor:pointer; text-decoration:underline; white-space:nowrap;
}

.search-bar {
  padding:10px 16px;
  background:#f5f7f0;
  border-bottom:1px solid #e0e8d8;
}
.search-bar input {
  width:100%; padding:9px 14px;
  border:1.5px solid #c8deb8; border-radius:24px;
  font-size:14px; background:#fff; outline:none; color:#222;
}
.search-bar input:focus { border-color:#2d6a2d; }

#map {
  width:100%; height:calc(100vh - 230px);
  min-height:400px;
}

.barn-marker {
  display:flex; align-items:center; justify-content:center;
  width:36px; height:36px;
  background:#e8302a;
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  border:2px solid #fff;
  box-shadow:0 2px 6px rgba(0,0,0,.35);
  font-size:18px; cursor:pointer; transition:.15s;
}
.barn-marker.dim { opacity:0.25; pointer-events:none; }

.leaflet-popup-content-wrapper {
  border-radius:14px !important;
  box-shadow:0 4px 20px rgba(0,0,0,.18) !important;
  padding:0 !important;
  min-width:270px;
}
.leaflet-popup-content { margin:0 !important; }
.popup-inner { padding:16px; }
.popup-inner h2 { font-size:16px; font-weight:800; color:#1a3d1a; margin-bottom:2px; }
.popup-badge {
  display:inline-block; font-size:10px; font-weight:700;
  padding:2px 7px; border-radius:20px; margin-bottom:6px;
  background:#e0f0cc; color:#2d6a2d; border:1px solid #aad08a;
}
.popup-badge.seasonal { background:#fff3cd; color:#856404; border-color:#ffc107; }
.popup-inner .addr  { font-size:12px; color:#777; margin-bottom:5px; }
.popup-inner .hours { font-size:12px; color:#555; margin-bottom:9px; }
.popup-inner .hours span { font-weight:600; color:#2d6a2d; }
.popup-products { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:11px; }
.popup-product {
  font-size:11px; background:#f0f7e8;
  border:1px solid #c8deb8; border-radius:20px;
  padding:3px 8px; color:#2d6a2d;
}
.popup-website {
  display:block; text-align:center;
  background:#2d6a2d; color:#fff;
  text-decoration:none; border-radius:8px;
  padding:7px 14px; font-size:13px; font-weight:600;
}
.popup-website:hover { background:#3a8a3a; }
.popup-website.no-site { background:#bbb; pointer-events:none; }

.footer {
  text-align:center; padding:8px;
  font-size:11px; color:#aaa;
  background:#fff; border-top:1px solid #e0e8d8;
}
</style>
</head>
<body>

<div class="header">
  <h1>🌽 Farmers Market Map</h1>
  <p>Established markets · tap a marker to see what's offered</p>
</div>

<div class="stats-bar">

  <div class="stat"><div class="num">30+</div><div class="lbl">farm types</div></div>
  <div class="stat"><div class="num">50k+</div><div class="lbl">weekly deals</div></div>
  <div class="stat"><div class="num">15k+</div><div class="lbl">members</div></div>
</div>

<div class="emoji-strip">
  <span class="filter-label">Filter:</span>

  <span class="emoji-filter" data-cat="fruit"    title="Fruit">🍎</span>
  <span class="emoji-filter" data-cat="meat"     title="Meat">🥩</span>
  <span class="emoji-filter" data-cat="eggs"     title="Eggs">🥚</span>

  <span class="emoji-filter" data-cat="bread"    title="Baked Goods">🍞</span>
  <span class="emoji-filter" data-cat="flowers"  title="Flowers">🌸</span>
  <span class="emoji-filter" data-cat="seafood"  title="Seafood">🦞</span>
  <span class="emoji-filter" data-cat="herbs"    title="Herbs">🌿</span>
  <span class="emoji-filter" data-cat="poultry"  title="Poultry">🍗</span>
  <span class="emoji-filter" data-cat="preserves"title="Jams & Preserves">🫙</span>
  <span class="clear-filter" id="clearFilter">Clear</span>
</div>

<div class="search-bar">
  <input id="searchBox" type="text" placeholder="🔍  Search by name or city...">
</div>

<div id="map"></div>
<div class="footer">Tap a marker · links open official market websites · always verify hours before visiting</div>

const map = L.map('map', { center:[36,-96], zoom:4 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://openstreetmap.org">OSM</a>',
  maxZoom:19, subdomains:'abcd'
}).addTo(map);

let activeFilter=null, searchQuery='', markers=[];

function barnIcon(dimmed){
  return L.divIcon({
    className:'',
    html:`<div class="barn-marker${dimmed?' dim':''}">🏠</div>`,
    iconSize:[36,36], iconAnchor:[18,18], popupAnchor:[0,-22]
  });
}

function buildPopup(m){
  const badge = m.year_round
    ? `<span class="popup-badge">✅ Year-round</span>`
    : `<span class="popup-badge seasonal">📅 Seasonal</span>`;
  const prods = m.cats
    .filter(c => CATS[c])
    .map(c=>`<span class="popup-product">${CATS[c].emoji} ${CATS[c].label}</span>`)
    .join('');
  const link = m.url
    ? `<a class="popup-website" href="${m.url}" target="_blank" rel="noopener noreferrer">Visit Official Website ↗</a>`
    : `<a class="popup-website no-site">No website listed</a>`;
  return `<div class="popup-inner">
    <h2>${m.name}</h2>
    ${badge}
    <div class="addr">📍 ${m.addr}</div>
    <div class="hours">⏰ <span>${m.hours}</span></div>
    <div class="popup-products">${prods}</div>
    ${link}
  </div>`;
}

function addMarkers(){
  markers = MARKETS.map(m => {
    const marker = L.marker([m.lat,m.lng], {icon:barnIcon(false)})
      .bindPopup(buildPopup(m), {maxWidth:310})
      .addTo(map);
    return {market:m, marker};
  });
  document.getElementById('statTotal').textContent = MARKETS.length;
}

function applyFilter(){
  let visible=0;
  markers.forEach(({market:m, marker})=>{
    const matchesCat    = !activeFilter || m.cats.includes(activeFilter);
    const q             = searchQuery.toLowerCase();
    const matchesSearch = !q || m.name.toLowerCase().includes(q) || m.addr.toLowerCase().includes(q);
    const show          = matchesCat && matchesSearch;
    marker.setIcon(barnIcon(!show));
    if(show) visible++;
  });
  document.getElementById('statTotal').textContent = visible;
}

document.querySelectorAll('.emoji-filter').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const cat = btn.dataset.cat;
    if(activeFilter===cat){
      activeFilter=null; btn.classList.remove('active');
    } else {
      document.querySelectorAll('.emoji-filter').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); activeFilter=cat;
    }
    applyFilter();
  });
});

document.getElementById('clearFilter').addEventListener('click',()=>{
  activeFilter=null;
  document.querySelectorAll('.emoji-filter').forEach(b=>b.classList.remove('active'));
  applyFilter();
});

document.getElementById('searchBox').addEventListener('input', e=>{
  searchQuery=e.target.value; applyFilter();
});

addMarkers();
</script>

</html>
