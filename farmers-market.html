<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmers Market Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background:#f5f7f0; color:#222; }

/* ── TOP HEADER ── */
.header {
  background:#fff;
  padding:14px 20px 10px;
  border-bottom:1px solid #e0e8d8;
  position:sticky; top:0; z-index:1000;
}
.header h1 { font-size:22px; color:#2d6a2d; font-weight:800; letter-spacing:-0.5px; }
.header p  { font-size:13px; color:#666; margin-top:2px; }

/* ── STATS BAR ── */
.stats-bar {
  display:flex; gap:0;
  background:#fff;
  border-bottom:1px solid #e0e8d8;
  overflow-x:auto;
}
.stat {
  flex:1; min-width:110px;
  text-align:center;
  padding:10px 8px;
  border-right:1px solid #e0e8d8;
}
.stat:last-child { border-right:none; }
.stat .num { font-size:20px; font-weight:800; color:#2d6a2d; }
.stat .lbl { font-size:11px; color:#777; margin-top:1px; }

/* ── EMOJI STRIP ── */
.emoji-strip {
  background:#fff;
  padding:10px 16px;
  border-bottom:1px solid #e0e8d8;
  display:flex; flex-wrap:wrap; gap:6px; align-items:center;
}
.emoji-filter {
  font-size:20px; cursor:pointer;
  padding:3px 6px; border-radius:8px;
  border:2px solid transparent;
  transition:.15s; line-height:1;
  title-attr: "";
}
.emoji-filter:hover   { background:#f0f7e8; border-color:#aad08a; }
.emoji-filter.active  { background:#e0f0cc; border-color:#2d6a2d; }
.filter-label { font-size:12px; color:#666; margin-right:4px; white-space:nowrap; }
.clear-filter {
  margin-left:auto; font-size:12px; color:#2d6a2d;
  cursor:pointer; text-decoration:underline; white-space:nowrap;
}

/* ── SEARCH ── */
.search-bar {
  padding:10px 16px;
  background:#f5f7f0;
  border-bottom:1px solid #e0e8d8;
}
.search-bar input {
  width:100%; padding:9px 14px;
  border:1.5px solid #c8deb8; border-radius:24px;
  font-size:14px; background:#fff; outline:none;
  color:#222;
}
.search-bar input:focus { border-color:#2d6a2d; }

/* ── MAP ── */
#map {
  width:100%; height:calc(100vh - 220px);
  min-height:400px;
}

/* ── CUSTOM MARKER ── */
.barn-marker {
  display:flex; align-items:center; justify-content:center;
  width:36px; height:36px;
  background:#e8302a;
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  border:2px solid #fff;
  box-shadow:0 2px 6px rgba(0,0,0,.35);
  font-size:18px;
  cursor:pointer;
  transition:.15s;
}
.barn-marker.dim { opacity:0.3; }

/* ── POPUP ── */
.leaflet-popup-content-wrapper {
  border-radius:14px !important;
  box-shadow:0 4px 20px rgba(0,0,0,.18) !important;
  padding:0 !important;
  min-width:260px;
}
.leaflet-popup-content { margin:0 !important; }
.popup-inner { padding:16px; }
.popup-inner h2 { font-size:16px; font-weight:800; color:#1a3d1a; margin-bottom:2px; }
.popup-inner .addr { font-size:12px; color:#777; margin-bottom:8px; }
.popup-inner .hours { font-size:12px; color:#555; margin-bottom:8px; }
.popup-inner .hours span { font-weight:600; color:#2d6a2d; }
.popup-products { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px; }
.popup-product {
  font-size:11px; background:#f0f7e8;
  border:1px solid #c8deb8; border-radius:20px;
  padding:3px 8px; color:#2d6a2d;
  display:flex; align-items:center; gap:3px;
}
.popup-website {
  display:block; text-align:center;
  background:#2d6a2d; color:#fff;
  text-decoration:none; border-radius:8px;
  padding:7px 14px; font-size:13px; font-weight:600;
  transition:.15s;
}
.popup-website:hover { background:#3a8a3a; }
.popup-website.no-site {
  background:#aaa; cursor:default; pointer-events:none;
}

/* ── FOOTER ── */
.footer {
  text-align:center; padding:8px;
  font-size:11px; color:#aaa;
  background:#fff; border-top:1px solid #e0e8d8;
}
</style>
</head>
<body>

  <div class="stat"><div class="num">50k+</div><div class="lbl">weekly deals</div></div>
  <div class="stat"><div class="num">15k+</div><div class="lbl">members</div></div>

<div class="emoji-strip">

  <span class="clear-filter" id="clearFilter">Clear filter</span>
</div>

<div class="search-bar">

</div>

<div id="map"></div>

<div class="footer">Data for informational purposes · Tap a marker to see details and visit official websites</div>

// ── MAP INIT ──
const map = L.map('map', {
  center: [28.05, -82.55],
  zoom: 10,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> · &copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 19,
  subdomains: 'abcd',
}).addTo(map);

// ── STATE ──
let activeFilter = null;
let searchQuery  = '';
let markers = [];  // [{market, marker, el}]

// ── CREATE MARKER ICON ──
function barnIcon(dimmed) {
  return L.divIcon({
    className: '',
    html: `<div class="barn-marker${dimmed ? ' dim' : ''}">🏠</div>`,
    iconSize:   [36, 36],
    iconAnchor: [18, 18],
    popupAnchor:[0, -20],
  });
}

// ── BUILD POPUP HTML ──
function buildPopup(m) {
  const prods = m.cats.map(c => {
    const cat = CATS[c];
    return `<span class="popup-product">${cat.emoji} ${cat.label}</span>`;
  }).join('');

  const link = m.url
    ? `<a class="popup-website" href="${m.url}" target="_blank" rel="noopener">Visit Website ↗</a>`
    : `<a class="popup-website no-site">No website listed</a>`;

  return `
    <div class="popup-inner">
      <h2>${m.name}</h2>
      <div class="addr">📍 ${m.addr}</div>
      <div class="hours">⏰ <span>${m.hours}</span></div>
      <div class="popup-products">${prods}</div>
      ${link}
    </div>`;
}

// ── ADD ALL MARKERS ──
function addMarkers() {
  markers = MARKETS.map(m => {
    const marker = L.marker([m.lat, m.lng], { icon: barnIcon(false) })
      .bindPopup(buildPopup(m), { maxWidth: 300 })
      .addTo(map);
    return { market: m, marker };
  });
  document.getElementById('statTotal').textContent = MARKETS.length;
}

// ── APPLY FILTER + SEARCH ──
function applyFilter() {
  let visible = 0;
  markers.forEach(({ market: m, marker }) => {
    const matchesCat    = !activeFilter || m.cats.includes(activeFilter);
    const q             = searchQuery.toLowerCase();
    const matchesSearch = !q || m.name.toLowerCase().includes(q) || m.addr.toLowerCase().includes(q);
    const show          = matchesCat && matchesSearch;

    marker.setIcon(barnIcon(!show));
    if (show) visible++;
  });
  document.getElementById('statTotal').textContent = visible;
}

// ── EMOJI FILTER BUTTONS ──
document.querySelectorAll('.emoji-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    if (activeFilter === cat) {
      activeFilter = null;
      btn.classList.remove('active');
    } else {
      document.querySelectorAll('.emoji-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = cat;
    }
    applyFilter();
  });
});

document.getElementById('clearFilter').addEventListener('click', () => {
  activeFilter = null;
  document.querySelectorAll('.emoji-filter').forEach(b => b.classList.remove('active'));
  applyFilter();
});

// ── SEARCH ──
document.getElementById('searchBox').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilter();
});

// ── INIT ──
addMarkers();
</script>

</html>
